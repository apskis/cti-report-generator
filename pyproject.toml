[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "W291",  # trailing whitespace — remaining occurrences are inside prompt-template strings
    "W293",  # blank line with whitespace — same (string content, not code)
]

[tool.ruff.lint.per-file-ignores]
# Standalone utility scripts insert the repo root on sys.path before importing.
"scripts/*" = ["E402"]

[tool.ruff.lint.isort]
known-first-party = ["src"]
