# OSINT Sources Configuration
# Add your vetted public intelligence sources here.
# The collector will pull recent articles from these RSS/Atom feeds.
#
# Supported types:
#   rss  - Standard RSS or Atom feed URL (preferred, most reliable)
#
# Each source needs:
#   name     - Display name for the source
#   url      - RSS/Atom feed URL
#   type     - "rss" (only supported type for now)
#   category - Category tag for organizing in reports
#   enabled  - true/false to quickly toggle sources on/off
#
# To find RSS feeds for a site:
#   - Check for /feed, /rss, /atom at the end of the URL
#   - Look for the RSS icon on the page
#   - Add /feed/ to most WordPress-based blogs

sources:

  # --- Government & Regulatory ---
  - name: "CISA Alerts"
    url: "https://www.cisa.gov/cybersecurity-advisories/all.xml"
    type: rss
    category: "Government Advisory"
    enabled: true

  - name: "US-CERT Current Activity"
    url: "https://www.cisa.gov/uscert/ncas/current-activity.xml"
    type: rss
    category: "Government Advisory"
    enabled: true

  # --- Threat Intelligence Blogs ---
  - name: "Krebs on Security"
    url: "https://krebsonsecurity.com/feed/"
    type: rss
    category: "Threat Research"
    enabled: true

  - name: "The Hacker News"
    url: "https://feeds.feedburner.com/TheHackersNews"
    type: rss
    category: "Threat News"
    enabled: true

  - name: "BleepingComputer"
    url: "https://www.bleepingcomputer.com/feed/"
    type: rss
    category: "Threat News"
    enabled: true

  - name: "Dark Reading"
    url: "https://www.darkreading.com/rss.xml"
    type: rss
    category: "Industry News"
    enabled: true

  # --- Vendor Threat Research ---
  - name: "Microsoft Threat Intelligence"
    url: "https://www.microsoft.com/en-us/security/blog/feed/"
    type: rss
    category: "Vendor Research"
    enabled: true

  # Google TAG's old blog.google feed is gone (404). The Google Online Security Blog
  # (Blogger) carries Google's security/threat research and has a stable Atom feed.
  - name: "Google Online Security Blog"
    url: "https://security.googleblog.com/feeds/posts/default"
    type: rss
    category: "Vendor Research"
    enabled: true

  # Mandiant was acquired by Google; its research now publishes on the Google Cloud
  # Threat Intelligence blog. The old mandiant.com feed returns non-RSS content.
  - name: "Google Cloud Threat Intelligence (Mandiant)"
    url: "https://cloudblog.withgoogle.com/topics/threat-intelligence/rss/"
    type: rss
    category: "Vendor Research"
    enabled: true

  - name: "Recorded Future"
    url: "https://www.recordedfuture.com/feed"
    type: rss
    category: "Vendor Research"
    enabled: false

  # --- Healthcare/Biotech Specific ---
  - name: "HHS Cybersecurity"
    url: "https://www.hhs.gov/hipaa/for-professionals/security/guidance/cybersecurity/index.html"
    type: rss
    category: "Healthcare"
    enabled: false

  # --- Vulnerability Research ---
  - name: "Qualys Threat Research"
    url: "https://blog.qualys.com/feed"
    type: rss
    category: "Vulnerability Research"
    enabled: false

# Lookback in days - only include articles published within this window
lookback_days: 7

# Maximum articles per source (increased to capture more breach news)
max_articles_per_source: 10

# Maximum total articles across all sources (increased for better coverage)
max_total_articles: 50
