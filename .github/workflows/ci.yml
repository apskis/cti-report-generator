name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install -r requirements-dev.txt
      - name: ruff check
        run: ruff check --output-format=github .
      - name: ruff format --check
        run: ruff format --check .

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run test suite with coverage
        run: pytest --cov=src --cov=gates --cov-report=term-missing

  dependency-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    # Non-blocking for now: surfaces transitive advisories without failing the build.
    # Flip continue-on-error to false once the dependency tree is clean.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install -r requirements-dev.txt
      - name: Audit runtime dependencies
        run: pip-audit -r requirements.txt --desc
